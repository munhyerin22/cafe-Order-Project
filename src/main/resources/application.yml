# ─────────────────────────────────────────────────────────────────
# 공통 설정
# ─────────────────────────────────────────────────────────────────
spring:
  application:
    name: cafe-Order-Service

  profiles:
    active: local   # 기본 활성 프로파일: local (배포 시 prod로 변경)

  jpa:
    hibernate:
      ddl-auto: create          # 엔티티 변경 시 테이블 자동 반영 (컬럼 추가 O, 삭제 X)
    properties:
      hibernate:
        format_sql: true        # 실행 SQL을 보기 좋게 들여쓰기
        use_sql_comments: true  # SQL 위에 어떤 동작인지 주석 출력

  data:
    redis:
      host: localhost  # Redis 서버 주소
      port: 6379       # Redis 기본 포트

# SQL 파라미터 값까지 로그로 출력 (개발 시 디버깅용)
logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

# JWT 설정
jwt:
  # 토큰 서명에 사용할 비밀키
  secret: "my-super-secret-key-for-jwt-signing-must-be-long-enough"
  # Access Token 만료 시간: 3600000ms = 1시간
  expiration: 3600000
